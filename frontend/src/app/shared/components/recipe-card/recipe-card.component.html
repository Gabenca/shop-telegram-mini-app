<div class="recipe-card" (click)="onClick()" role="button" tabindex="0" [attr.aria-label]="recipe.name">
  <div class="image-container">
    @if (recipe.photoUrl) {
      <img [src]="'/api/recipes/photo/' + recipe.photoUrl" [alt]="recipe.name" class="recipe-image" loading="lazy" />
      <div class="image-overlay"></div>
    } @else {
      <div class="placeholder-image">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
      </div>
    }
    <div class="recipe-name-overlay">
      <span class="recipe-name">{{ recipe.name }}</span>
    </div>
  </div>
</div>
