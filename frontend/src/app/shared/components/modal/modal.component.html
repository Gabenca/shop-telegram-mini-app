@if (isOpen) {
  <div class="modal-backdrop" (click)="onBackdropClick($event)">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">{{ title }}</h2>
        <button class="close-btn" (click)="onClose()">×</button>
      </div>
      <div class="modal-body">
        <ng-content />
      </div>
    </div>
  </div>
}
