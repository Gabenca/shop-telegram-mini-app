<div class="container">
  <div class="header-section">
    <div class="header-left">
      <h1 class="title">Ваша пара</h1>
      <p class="subtitle">Готовьте вместе, наслаждайтесь моментом</p>
    </div>
    <app-home-button />
  </div>

  @if (isLoading()) {
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <p>Загружаем...</p>
    </div>
  }

  @if (couple) {
    <!-- Members Card -->
    <div class="members-card">
      <div class="members-list">
        @for (user of couple.users; track user.id; let i = $index) {
          <div class="user-item">
            <div class="user-avatar">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>
            <span class="user-name">{{ user.username }}</span>
          </div>
          @if (i < couple.users.length - 1) {
            <div class="heart-divider">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
              </svg>
            </div>
          }
        }
      </div>
    </div>

    <!-- Invite Code -->
    <div class="code-section">
      <label class="section-label">Поделитесь кодом с партнёром</label>
      <div class="code-card">
        <span class="code-display">{{ couple.inviteCode }}</span>
      </div>
      <button class="btn-warm-primary" (click)="shareCode()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
          <polyline points="16 6 12 2 8 6"></polyline>
          <line x1="12" y1="2" x2="12" y2="15"></line>
        </svg>
        Поделиться
      </button>
    </div>

    <!-- Leave Button -->
    <button class="btn-warm-danger" (click)="leaveCouple()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      Покинуть пару
    </button>
  }
</div>
