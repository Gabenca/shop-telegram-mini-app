<div class="container">
  <div class="hero-section">
    <div class="hero-illustration">
      <svg width="200" height="160" viewBox="0 0 200 160" fill="none">
        <!-- Blob background -->
        <ellipse cx="100" cy="90" rx="80" ry="60" fill="#F5E6D3" opacity="0.6"/>
        <!-- Table -->
        <ellipse cx="100" cy="130" rx="50" ry="12" fill="#E8DFD5" opacity="0.5"/>
        <!-- Person 1 -->
        <circle cx="70" cy="75" r="18" fill="#D4734C" opacity="0.2"/>
        <circle cx="70" cy="75" r="18" stroke="#D4734C" stroke-width="2" fill="none" opacity="0.4"/>
        <path d="M55 95 Q70 105 85 95" stroke="#D4734C" stroke-width="2" fill="none" opacity="0.4"/>
        <!-- Person 2 -->
        <circle cx="130" cy="75" r="18" fill="#7A8B6E" opacity="0.2"/>
        <circle cx="130" cy="75" r="18" stroke="#7A8B6E" stroke-width="2" fill="none" opacity="0.4"/>
        <path d="M115 95 Q130 105 145 95" stroke="#7A8B6E" stroke-width="2" fill="none" opacity="0.4"/>
        <!-- Heart -->
        <path d="M100 55 C95 50 90 55 90 60 C90 68 100 75 100 75 C100 75 110 68 110 60 C110 55 105 50 100 55Z" fill="#D4734C" opacity="0.6"/>
        <!-- Food on table -->
        <circle cx="85" cy="125" r="8" fill="#D4734C" opacity="0.3"/>
        <circle cx="115" cy="125" r="8" fill="#7A8B6E" opacity="0.3"/>
      </svg>
    </div>
    <h1 class="hero-title">Готовьте вместе</h1>
    <p class="hero-subtitle">Планируйте питание и готовьте вдвоём</p>
  </div>

  @if (isLoading()) {
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <p>Загрузка...</p>
    </div>
  }

  @if (mode === 'initial') {
    <div class="buttons-section">
      <button class="btn-warm-primary" (click)="createCouple()" [disabled]="isLoading()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="8.5" cy="7" r="4"></circle>
          <line x1="20" y1="8" x2="20" y2="14"></line>
          <line x1="23" y1="11" x2="17" y2="11"></line>
        </svg>
        Создать пару
      </button>
      <button class="btn-warm-secondary" (click)="showJoinMode()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        Ввести код
      </button>
    </div>
  }

  @if (mode === 'create') {
    <div class="code-section">
      <button class="btn-text" (click)="goHome()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        На главную
      </button>
      <p class="code-subtitle">Поделитесь кодом с партнёром:</p>
      <div class="code-card">
        <span class="code-display">{{ generatedCode }}</span>
      </div>
      <button class="btn-warm-primary" (click)="shareCode()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path>
          <polyline points="16 6 12 2 8 6"></polyline>
          <line x1="12" y1="2" x2="12" y2="15"></line>
        </svg>
        Поделиться
      </button>
    </div>
  }

  @if (mode === 'join') {
    <div class="join-section">
      <button class="btn-text" (click)="backToInitial()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Назад
      </button>
      <form [formGroup]="joinForm" (ngSubmit)="joinCouple()">
        <label class="form-label">Введите 6-значный код</label>
        <input
          type="text"
          class="code-input"
          formControlName="inviteCode"
          placeholder="000000"
          maxlength="6"
          autocomplete="off"
        />
        <button class="btn-warm-primary" type="submit" [disabled]="isLoading()">
          @if (isLoading()) {
            <div class="spinner-small"></div>
          } @else {
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          }
          Присоединиться
        </button>
      </form>
    </div>
  }

  @if (error) {
    <div class="error-message">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      {{ error }}
    </div>
  }
</div>
