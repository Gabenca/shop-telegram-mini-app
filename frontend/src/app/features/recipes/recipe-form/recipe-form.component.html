<div class="form-container">
  <div class="form-header">
    <h1 class="form-title">{{ isEditMode ? 'Редактировать рецепт' : 'Новый рецепт' }}</h1>
    <app-home-button />
  </div>

  <form [formGroup]="recipeForm">
    <!-- Name -->
    <div class="form-group">
      <label class="form-label" for="recipe-name">Название</label>
      <input
        type="text"
        id="recipe-name"
        class="form-input"
        formControlName="name"
        placeholder="Например: Борщ"
        autocomplete="off" />
    </div>

    <!-- Description -->
    <div class="form-group">
      <label class="form-label" for="recipe-description">Описание</label>
      <textarea
        id="recipe-description"
        class="form-textarea"
        formControlName="description"
        placeholder="Краткое описание блюда"
        rows="3"></textarea>
    </div>

    <!-- Photo -->
    <div class="form-group">
      <label class="form-label">Фото</label>
      @if (recipeForm.get('photoUrl')?.value) {
        <div class="photo-preview">
          <img [src]="'/api/recipes/photo/' + recipeForm.get('photoUrl')?.value" alt="Preview" />
          <button class="btn-change-photo" type="button" (click)="addPhoto()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4L18.5 2.5z"></path>
            </svg>
            Изменить
          </button>
        </div>
      } @else {
        <button class="btn-add-photo" type="button" (click)="addPhoto()">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          <span>Нажмите, чтобы добавить фото</span>
        </button>
      }
    </div>

    <!-- Ingredients -->
    <div class="form-group" formArrayName="ingredients">
      <div class="ingredients-header">
        <label class="form-label">Ингредиенты</label>
        <span class="ingredients-count">{{ ingredients.controls.length }}</span>
      </div>

      @for (ingredient of ingredients.controls; track $index; let i = $index) {
        <div class="ingredient-row" [formGroupName]="i" @slideDown>
          <input
            type="text"
            class="form-input ingredient-name"
            formControlName="name"
            placeholder="Название" />
          <input
            type="number"
            class="form-input ingredient-amount"
            formControlName="quantity"
            placeholder="0" />
          <div class="select-wrapper ingredient-unit">
            <select class="form-select" formControlName="unit">
              @for (unit of units; track unit.value) {
                <option [value]="unit.value">{{ unit.label }}</option>
              }
            </select>
            <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <button class="btn-remove" type="button" (click)="removeIngredient(i)" aria-label="Удалить ингредиент">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      }

      <button class="btn-add-ingredient" type="button" (click)="addIngredient()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Ингредиент
      </button>
    </div>

    <!-- Instructions -->
    <div class="form-group">
      <label class="form-label" for="recipe-instructions">Инструкция приготовления</label>
      <textarea
        id="recipe-instructions"
        class="form-textarea"
        formControlName="instructions"
        placeholder="Пошаговая инструкция"
        rows="8"></textarea>
    </div>

    <!-- Actions -->
    <div class="form-actions">
      <button class="btn-warm-primary" type="button" (click)="saveRecipe()">Сохранить рецепт</button>
      <button class="btn-warm-secondary" type="button" (click)="goBack()">Отмена</button>
    </div>
  </form>
</div>
