version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: recipe_couple_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: recipe_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
